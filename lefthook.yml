pre-commit:
  parallel: true
  commands:
    generate-indicators:
      glob: "src/data/labtest-indicators.csv"
      run: pnpm generate:indicators && git add src/data/labtest-indicators.ts
    lint:
      glob: "*.{js,ts,jsx,tsx}"
      run: pnpm oxlint {staged_files}
    format:
      glob: "*.{js,ts,jsx,tsx}"
      run: pnpm oxfmt {staged_files} --write && git add {staged_files}
    stylelint:
      glob: "*.{css,scss}"
      run: pnpm stylelint {staged_files}
    knip:
      run: pnpm knip

commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit {1}
